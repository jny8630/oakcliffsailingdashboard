name: Update LNM Digest

on:
  schedule:
    - cron: '0 16 * * 5'   # Friday 4pm UTC = noon ET (after Thursday publication)
  workflow_dispatch:         # allow manual trigger from GitHub Actions tab

permissions:
  contents: write            # needed to commit lnm_current.json back to repo

jobs:
  update-lnm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch and extract LNM
        run: python3 scripts/fetch_lnm.py

      - name: Commit updated JSON if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lnm_current.json
          git diff --cached --quiet && echo "No changes." || {
            git commit -m "chore: update LNM digest week $(python3 -c 'import json; d=json.load(open(\"lnm_current.json\")); print(str(d[\"week\"])+\"/\"+str(d[\"year\"]))')"
            git push
          }
