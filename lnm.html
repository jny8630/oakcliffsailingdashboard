<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#080e18">
<title>LNM Digest — Oyster Bay</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
<style>
:root{--bg:#080e18;--card:#131f2e;--card2:#0c1520;--bdr:#1a2d42;--bdr2:#2a4060;--txt:#f0f4f8;--dim:#c4d0de;--mut:#8fa3b8;--fnt:#6b8299;--accent:#4fd1c5;--blue:#63b3ed;--orange:#ed8936;--green:#48bb78;--red:#f56565;--yellow:#ecc94b;--mono:'SF Mono','Cascadia Code','JetBrains Mono','Fira Code',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'SF Pro Display','Segoe UI',system-ui,sans-serif;background:linear-gradient(170deg,var(--bg),#0c1822 40%,var(--bg));color:var(--txt);max-width:440px;margin:0 auto;min-height:100vh;-webkit-font-smoothing:antialiased}
.hdr{background:linear-gradient(135deg,#0e1f30,#162d46);padding:18px 16px 14px;border-bottom:1px solid var(--bdr)}
.hdr-row{display:flex;justify-content:space-between;align-items:flex-start}
.hdr-label{font-size:10px;color:var(--accent);font-weight:700;letter-spacing:.12em;text-transform:uppercase}
.hdr-title{font-size:20px;font-weight:800;letter-spacing:-.03em;margin-top:2px}
.back-btn{background:var(--bdr);border:1px solid var(--bdr2);border-radius:8px;color:var(--accent);padding:6px 12px;font-size:12px;font-weight:600;font-family:inherit;text-decoration:none;display:inline-block;white-space:nowrap}
.cnt{padding:10px 10px 30px}
.card{background:linear-gradient(145deg,var(--card),var(--card2));border:1px solid var(--bdr);border-radius:14px;margin-bottom:10px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.card-bar{height:2px}
.card-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;color:var(--dim)}
.card-t{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.card-body{padding:0 16px 16px}

/* Notice rows */
.notice-item{padding:12px 0;border-bottom:1px solid rgba(26,45,66,.6)}
.notice-item:last-child{border-bottom:none}
.notice-loc{font-size:13px;font-weight:700;color:var(--txt);margin-bottom:3px}
.notice-sum{font-size:12px;color:var(--dim);line-height:1.5;margin-bottom:6px}
.notice-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.badge{display:inline-block;font-size:9px;font-weight:700;padding:2px 7px;border-radius:3px;letter-spacing:.05em;font-family:var(--mono)}
.badge-active{background:rgba(237,137,54,.15);color:var(--orange);border:1px solid rgba(237,137,54,.25)}
.badge-temporary{background:rgba(236,201,75,.12);color:var(--yellow);border:1px solid rgba(236,201,75,.2)}
.badge-cancelled{background:rgba(72,187,120,.1);color:var(--green);border:1px solid rgba(72,187,120,.2)}
.notice-chart{font-size:10px;color:var(--mut);font-family:var(--mono)}
.notice-since{font-size:10px;color:var(--fnt)}

/* Empty / loading / error states */
.state-box{padding:20px 16px;text-align:center;color:var(--mut);font-size:12px;line-height:1.7}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--bdr2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:8px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Attribution bar */
.attr{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;padding:10px 16px 14px;border-top:1px solid var(--bdr);margin-top:2px}
.attr-info{font-size:10px;color:var(--fnt)}
.attr-link{font-size:11px;font-weight:600;color:var(--accent);text-decoration:none;padding:5px 10px;background:rgba(79,209,197,.1);border:1px solid rgba(79,209,197,.2);border-radius:6px;white-space:nowrap}
.attr-link:active{opacity:.7}
.stale-warn{background:rgba(236,201,75,.08);border:1px solid rgba(236,201,75,.2);border-radius:8px;padding:8px 12px;margin-bottom:10px;font-size:11px;color:var(--yellow);line-height:1.5}

/* PDF link card */
.pdf-btn{display:block;width:100%;padding:14px;background:rgba(79,209,197,.1);border:1px solid rgba(79,209,197,.25);border-radius:10px;color:var(--accent);font-size:14px;font-weight:700;text-decoration:none;text-align:center;margin-bottom:8px}
.pdf-btn:active{opacity:.7}
.pdf-btn-sm{display:block;width:100%;padding:9px;background:transparent;border:1px solid var(--bdr);border-radius:8px;color:var(--mut);font-size:11px;font-weight:500;text-decoration:none;text-align:center}
.pdf-btn-sm:active{opacity:.7}
.pdf-note{font-size:10px;color:var(--fnt);margin-top:8px;line-height:1.5}
.week-disp{font-size:32px;font-weight:800;font-family:var(--mono);color:var(--accent);line-height:1}
.week-year{font-size:14px;color:var(--mut);font-family:var(--mono);margin-left:4px}

.footer{text-align:center;padding:14px 0;font-size:10px;color:var(--fnt);border-top:1px solid var(--bdr);margin-top:6px}
.footer a{color:var(--accent);text-decoration:none}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-row">
    <div>
      <div class="hdr-label">USCG District 1 · Oyster Bay</div>
      <div class="hdr-title">Notice to Mariners</div>
    </div>
    <a class="back-btn" href="index.html">← Dashboard</a>
  </div>
</div>

<div class="cnt">

  <!-- ACTIVE NOTICES -->
  <div class="card">
    <div class="card-bar" style="background:linear-gradient(90deg,transparent,var(--orange),transparent)"></div>
    <div class="card-hdr">
      <div class="card-t">⚠ Active Notices — Oyster Bay</div>
    </div>
    <div class="card-body" id="notices-body">
      <div class="state-box">
        <div class="spinner"></div><br>Loading notices…
      </div>
    </div>
  </div>

  <!-- CURRENT LNM PDF -->
  <div class="card">
    <div class="card-bar" style="background:linear-gradient(90deg,transparent,var(--accent),transparent)"></div>
    <div class="card-hdr">
      <div class="card-t">📋 Current LNM PDF</div>
    </div>
    <div class="card-body">
      <a class="pdf-btn" id="lnm-cur" href="#" target="_blank" rel="noopener">Loading PDF link…</a>
      <div id="lnm-extras" style="margin-top:6px"></div>
      <div class="pdf-note" style="margin-top:10px">Published Thursdays · District 1 covers Maine to NJ<br>
        <a href="https://www.navcen.uscg.gov/local-notices-to-mariners-by-cg-district" target="_blank" rel="noopener" style="color:var(--accent)">NAVCEN LNM index ↗</a>
      </div>
    </div>
  </div>

</div>

<div class="footer">
  Data: <a href="https://www.navcen.uscg.gov" target="_blank" rel="noopener">USCG NAVCEN</a> · District 1 LNM<br>
  For planning only — not for navigation
</div>

<script>
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── ISO week helpers ─────────────────────────────────────────────────────────
function isoWeekData(d) {
  const t = new Date(d); t.setHours(0,0,0,0);
  t.setDate(t.getDate() + 3 - (t.getDay() + 6) % 7);
  const w1 = new Date(t.getFullYear(), 0, 4);
  const week = 1 + Math.round(((t - w1) / 86400000 - 3 + (w1.getDay() + 6) % 7) / 7);
  return {week, year: t.getFullYear()};
}

function weekStartDate(week, year) {
  const jan4 = new Date(year, 0, 4);
  const w1mon = new Date(jan4);
  w1mon.setDate(jan4.getDate() - ((jan4.getDay() + 6) % 7));
  const start = new Date(w1mon);
  start.setDate(w1mon.getDate() + (week - 1) * 7);
  return start;
}

function fmtDate(d) {
  return d.toLocaleDateString('en-US', {month:'short', day:'numeric'});
}

function weekLabel(week, year) {
  const start = weekStartDate(week, year);
  const end = new Date(start); end.setDate(start.getDate() + 6);
  return `Week ${week} · ${fmtDate(start)}–${fmtDate(end)}, ${year}`;
}

function lnmUrl(week, year) {
  return `https://www.navcen.uscg.gov/sites/default/files/pdf/lnms/lnm01${String(week).padStart(2,'0')}${year}.pdf`;
}

// ── Notices rendering ────────────────────────────────────────────────────────
function badgeClass(status) {
  const s = (status||'').toUpperCase();
  return s === 'TEMPORARY' ? 'badge-temporary' : s === 'CANCELLED' ? 'badge-cancelled' : 'badge-active';
}

function renderNotices(data) {
  const body = document.getElementById('notices-body');
  const notices = data.notices || [];
  const skipped = data.skipped || [];

  // Gap warning: are there newer weeks we couldn't process?
  let gapHtml = '';
  if (skipped.length) {
    const reasons = skipped.map(s => {
      if (s.reason === 'not_posted') return `Week ${s.week} not yet published`;
      if (s.reason === 'scanned_pdf') return `Week ${s.week} was a scanned PDF (no machine-readable text)`;
      return `Week ${s.week} unavailable`;
    });
    gapHtml = `<div class="stale-warn">Data is from ${weekLabel(data.week, data.year)}.<br>${reasons.join(' · ')}.</div>`;
  }

  if (!notices.length) {
    body.innerHTML = gapHtml + '<div class="state-box" style="color:var(--green)">✓ No relevant notices found for Oyster Bay / Long Island Sound.</div>';
    renderPdfCard(data);
    return;
  }

  const rows = notices.map(n => `
    <div class="notice-item">
      <div class="notice-loc">${escHtml(n.location || '—')}</div>
      <div class="notice-sum">${escHtml(n.summary || '')}</div>
      <div class="notice-meta">
        <span class="badge ${badgeClass(n.status)}">${escHtml((n.status||'ACTIVE').toUpperCase())}</span>
        ${n.chart ? `<span class="notice-chart">Chart&nbsp;${escHtml(n.chart)}</span>` : ''}
        ${n.since ? `<span class="notice-since">Since&nbsp;${escHtml(n.since)}</span>` : ''}
      </div>
    </div>`).join('');

  body.innerHTML = gapHtml + rows + `
    <div class="attr">
      <div class="attr-info">AI-extracted · ${weekLabel(data.week, data.year)}<br>${escHtml(data.disclaimer||'')}</div>
      <a class="attr-link" href="${escHtml(data.pdf_url||'#')}" target="_blank" rel="noopener">Source PDF ↗</a>
    </div>`;

  renderPdfCard(data);
}

// ── PDF card: all weeks ordered newest-first, verified week clearly marked
function renderPdfCard(data) {
  const noticesWeek = data ? data.week : null;
  const noticesYear = data ? data.year : null;
  const skipped = data ? (data.skipped || []) : [];

  // Build a unified list of all weeks, newest first
  const allWeeks = [];

  // Skipped weeks (most recent first — they come out of fetch_lnm in that order)
  skipped.forEach(s => {
    const note = s.reason === 'not_posted' ? 'not yet published'
               : s.reason === 'scanned_pdf' ? 'scanned PDF — no machine-readable text'
               : 'unavailable';
    allWeeks.push({ week: s.week, year: s.year, note, working: false });
  });

  // The verified working week (oldest of the set, shown last)
  if (noticesWeek) {
    allWeeks.push({ week: noticesWeek, year: noticesYear, note: 'last available', working: true });
  }

  // Sort newest-first
  allWeeks.sort((a, b) => b.year !== a.year ? b.year - a.year : b.week - a.week);

  // Hide the static primary button — we render everything dynamically in order
  const lnmCur = document.getElementById('lnm-cur');
  lnmCur.style.display = 'none';

  // Render all weeks newest-first; working week gets the primary (teal) style
  const extras = document.getElementById('lnm-extras');
  if (!extras) return;
  extras.innerHTML = allWeeks.map(w =>
    w.working
      ? `<a class="pdf-btn" href="${lnmUrl(w.week, w.year)}" target="_blank" rel="noopener">${weekLabel(w.week, w.year)} — available ↗</a>`
      : `<a class="pdf-btn-sm" href="${lnmUrl(w.week, w.year)}" target="_blank" rel="noopener">${weekLabel(w.week, w.year)} — ${w.note}</a>`
  ).join('');
}

async function loadNotices() {
  const body = document.getElementById('notices-body');
  try {
    const r = await fetch('lnm_current.json?_=' + Date.now());
    if (!r.ok) throw new Error(r.status);
    const data = await r.json();
    renderNotices(data);
  } catch(e) {
    body.innerHTML = `<div class="state-box"><div style="color:var(--mut);margin-bottom:8px">Notices unavailable — use the PDF below.</div><div style="font-size:10px;color:var(--fnt)">Auto-updated each Friday via GitHub Actions</div></div>`;
    renderPdfCard(null);
  }
}

loadNotices();
</script>
</body>
</html>
